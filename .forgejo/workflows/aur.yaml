name: aur

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [PKGBUILD]

jobs:
  publish:
    runs-on: nix
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate .SRCINFO
        run: |
          tmp_home="$(mktemp -d)"
          trap 'rm -rf "$tmp_home"' EXIT
          export HOME="$tmp_home"
          export XDG_CONFIG_HOME="$tmp_home/.config"
          makepkg_conf="$(nix eval --raw nixpkgs#pacman.outPath)/etc/makepkg.conf"
          nix-shell -p pacman git --run "makepkg --config '$makepkg_conf' --printsrcinfo" > .SRCINFO

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          tmp_home="$(mktemp -d)"
          trap 'rm -rf "$tmp_home"' EXIT
          export HOME="$tmp_home"
          export XDG_CONFIG_HOME="$tmp_home/.config"
          ssh_dir="$tmp_home/.ssh"
          mkdir -p "$ssh_dir"
          printf '%s\n' "$AUR_SSH_KEY" > "$ssh_dir/id_ed25519"
          chmod 600 "$ssh_dir/id_ed25519"
          ssh-keyscan -t ed25519 aur.archlinux.org > "$ssh_dir/known_hosts" 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $ssh_dir/id_ed25519 -o IdentitiesOnly=yes -o UserKnownHostsFile=$ssh_dir/known_hosts"
          aur_dir="$(mktemp -d)"
          git clone ssh://aur@aur.archlinux.org/sioyek-dev.git "$aur_dir"
          cp PKGBUILD .SRCINFO "$aur_dir/"
          cd "$aur_dir"
          git config user.name "Barrett Ruth"
          git config user.email "br@barrettruth.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "update .SRCINFO"
          git push
